# ========================
# Clash-ALL 优化配置（最终完整版 ）
# ========================

# 机场节点订阅
proxy-providers:
  订阅1:
    url: "填入订阅地址xxxxx"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
  订阅2:
    url: "填入订阅地址xxxxx"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
  订阅3:
    url: "填入订阅地址xxxxx"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090

# ========================
# DNS 设置
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 223.5.5.5
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    - +.km688.ink
    - +.onesubv.site
    - +.oneyyds.online
    - +.fengyyds.site
    - +.onemg.top
    - +.chybinc.com
    - +.invitevp.com
    - +.vp2.us
    - +.xiaoniuyun.cc
    - +.apple-bing.sbs
    - +.bncrcloud.com
    - +.xby01.xyz
    - +.idsduf.com
    - +.66jc.top
    - +.gfw.gg
    - +.moedog.cloud
    - +.ynhtbank.com
    - +.qeayr.cn
    - +.saojc.xyz
    - +.sssyun.xyz
    - +.dler.cloud
    - +.0tk8a3a1q4t94dler.com
    - +.aerianas.top
    - +.gptacg.top
    - +.wxda.net

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 直连
    - 所有-手动
    - 所有-自动
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 新加坡-故转
    - 韩国-手动
    - 美国-故转
    - 英国-手动
    - 拒绝

proxy-groups:
  - name: "Google"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/google.png'
    <<: *default

  - name: "Telegram"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/telegram.png'
    <<: *default

  - name: "Twitter"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/%E6%8E%A8%E7%89%B9.png'
    <<: *default

  - name: "巴哈姆特" 
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/%E5%B7%B4%E5%93%88%E5%A7%86%E7%89%B92.png'
    type: select
    proxies: [直连, 所有-自动, 台湾-故转, 日本-故转, 香港-故转, 所有-手动]

  - name: "YouTube"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/youtube.png'
    <<: *default

  - name: "NETFLIX"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Netflix2.png'
    type: select
    proxies: [直连, 所有-自动, 香港-故转, 日本-故转, 新加坡-故转, 韩国-手动, 美国-故转, 英国-手动, 所有-手动]

  - name: "Spotify"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/spotify.png'
    <<: *default

  - name: "Github"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/GitHub.png'
    <<: *default
    
  - name: ChatGPT
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/ChatGPT.png'
    <<: *default

  - name: Gemini
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Gemini.png'
    <<: *default

  - name: Meta AI
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/MetaAI.png' 
    <<: *default

  - name: Facebook
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Facebook.png'
    <<: *default

  - name: TikTok
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/TikTok.png'
    <<: *default

  - name: HBO
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/HBO.png'
    <<: *default

  - name: Disney
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Disney.png'
    <<: *default

  - name: Steam
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Steam.png'
    <<: *default

  - name: Games
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Games.png'
    <<: *default

  - name: Apple
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Apple.png'
    <<: *default

  - name: Microsoft
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/Microsoft.png'
    <<: *default
    
  - name: "测速工具"
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/%E6%B5%8B%E9%80%9F%E5%B7%A5%E5%85%B7.png'
    <<: *default

  - name: 国外
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/%E5%9B%BD%E5%A4%96.png'
    <<: *default

  - name: 国内
    icon: 'https://raw.githubusercontent.com/wanpijun2/--icon/main/%E5%9C%B0%E7%90%83.png'
    <<: *default

  - name: 所有-手动
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"
  - name: 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(直连|拒绝)).)*$"

  - name: 香港-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [香港-手动, 香港-自动]
  - name: 香港-手动
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
  - name: 香港-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  - name: 台湾-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [台湾-手动, 台湾-自动]
  - name: 台湾-手动
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|Taipei|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
  - name: 台湾-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|Taipei|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"

  - name: 日本-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [日本-手动, 日本-自动]
  - name: 日本-手动
    type: select
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: 日本-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 新加坡-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [新加坡-手动, 新加坡-自动]
  - name: 新加坡-手动
    type: select
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  - name: 新加坡-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  - name: 韩国-手动
    type: select
    include-all: true
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"

  - name: 美国-故转
    type: fallback
    interval: 300
    lazy: false
    proxies: [美国-手动, 美国-自动]
  - name: 美国-手动
    type: select
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
  - name: 美国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 300
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  - name: 英国-手动
    type: select
    include-all: true
    filter: "(?=.*(英国|英|伦敦|UK|United Kingdom|🇬🇧|London)).*$"

